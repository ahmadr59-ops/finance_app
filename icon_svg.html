<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{margin:0;background:#16213A;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:24px;font-family:-apple-system,sans-serif}
.label{color:#fff;font-size:13px;opacity:0.6}
canvas{border-radius:22%;box-shadow:0 8px 32px rgba(15,79,160,0.5)}
.row{display:flex;gap:24px;align-items:center;flex-direction:column}
button{background:#1865C2;color:#fff;border:none;padding:12px 24px;border-radius:12px;font-size:14px;cursor:pointer;margin-top:8px}
</style>
</head>
<body>
<div class="row">
  <canvas id="c512" width="512" height="512"></canvas>
  <div class="label">512×512 — icon-512.png</div>
  <canvas id="c192" width="192" height="192"></canvas>
  <div class="label">192×192 — icon-192.png</div>
  <canvas id="c180" width="180" height="180"></canvas>
  <div class="label">180×180 — icon-180.png (Apple Touch)</div>
  <canvas id="c167" width="167" height="167"></canvas>
  <div class="label">167×167 — icon-167.png (iPad)</div>
  <canvas id="c152" width="152" height="152"></canvas>
  <div class="label">152×152 — icon-152.png (iPad legacy)</div>
  <canvas id="c32" width="32" height="32"></canvas>
  <div class="label">32×32 — icon-32.png (favicon)</div>
  <button onclick="downloadAll()">⬇️ دانلود همه آیکون‌ها</button>
</div>

<script>
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}
function roundRectFill(ctx, x, y, w, h, r) { roundRect(ctx,x,y,w,h,r); ctx.fill(); }

function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const r = s * 0.22;

  // Tejarat-inspired blue gradient background
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#2E83DE');
  grad.addColorStop(1, '#0F4FA0');
  ctx.fillStyle = grad;
  roundRect(ctx, 0, 0, s, s, r);
  ctx.fill();

  // Soft glow
  const glow = ctx.createRadialGradient(s*0.3, s*0.28, 0, s*0.5, s*0.5, s*0.6);
  glow.addColorStop(0, 'rgba(255,255,255,0.18)');
  glow.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = glow;
  roundRect(ctx, 0, 0, s, s, r);
  ctx.fill();

  const u = s / 512;

  ctx.save();
  ctx.translate(256*u, 246*u);

  // outer ring
  ctx.beginPath();
  ctx.arc(0, 0, 132*u, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.13)';
  ctx.fill();

  // white circle
  ctx.beginPath();
  ctx.arc(0, 0, 108*u, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // Persian letter "س" for Sarmaye
  ctx.font = `700 ${128*u}px Vazirmatn, Tahoma, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#0F4FA0';
  ctx.fillText('س', 4*u, 10*u);

  ctx.restore();

  // Growth trend line
  ctx.beginPath();
  ctx.moveTo(120*u, 400*u);
  ctx.lineTo(195*u, 360*u);
  ctx.lineTo(255*u, 392*u);
  ctx.lineTo(392*u, 322*u);
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 14*u;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Arrow head
  ctx.beginPath();
  ctx.moveTo(360*u, 322*u);
  ctx.lineTo(392*u, 322*u);
  ctx.lineTo(392*u, 354*u);
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 14*u;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Dots on trend line
  ctx.beginPath();
  ctx.arc(120*u, 400*u, 9*u, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(255*u, 392*u, 9*u, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
}

const canvases = ['c512','c192','c180','c167','c152','c32'];
function renderAll(){ canvases.forEach(id => drawIcon(document.getElementById(id))); }

if (document.fonts && document.fonts.ready) {
  document.fonts.load('700 128px Vazirmatn').then(renderAll).catch(renderAll);
  document.fonts.ready.then(renderAll);
} else {
  renderAll();
}
renderAll();

function downloadAll() {
  canvases.forEach(id => {
    const c = document.getElementById(id);
    const a = document.createElement('a');
    a.download = `icon-${c.width}.png`;
    a.href = c.toDataURL('image/png');
    a.click();
  });
}
</script>
</body>
</html>
