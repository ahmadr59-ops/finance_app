<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#6C63FF">
<title>مالی‌یار</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#6C63FF;--primary-light:#EEF0FF;--primary-dark:#5046E4;
  --green:#1D9E75;--green-light:#E1F5EE;--red:#E24B4A;--red-light:#FCEBEB;
  --amber:#BA7517;--amber-light:#FAEEDA;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --bg:#F7F8FC;--card:#FFFFFF;--border:#E8E9F0;
  --text:#1A1A2E;--text2:#6B7280;--text3:#9CA3AF;
  --shadow:0 2px 12px rgba(108,99,255,0.08);
  --radius:16px;--radius-sm:10px;
  --safe-bottom: env(safe-area-inset-bottom);
  --safe-top: env(safe-area-inset-top);
}
body{font-family:'Vazirmatn',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;direction:rtl}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;background:var(--bg);position:relative}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 80px 0;padding-bottom:calc(80px + var(--safe-bottom));display:none}
.screen.active{display:block}

/* Header */
.header{background:var(--primary);color:#fff;padding:calc(var(--safe-top) + 16px) 20px 20px;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:600}
.header p{font-size:12px;opacity:0.8;margin-top:2px}
.header-row{display:flex;justify-content:space-between;align-items:center}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:var(--safe-bottom);box-shadow:0 -4px 20px rgba(0,0,0,0.06)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;border:none;background:none;cursor:pointer;color:var(--text3);transition:color 0.2s;font-family:'Vazirmatn',sans-serif}
.nav-btn.active{color:var(--primary)}
.nav-btn svg{width:22px;height:22px;stroke-width:1.8}
.nav-btn span{font-size:10px;font-weight:500}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin:12px 16px 0}
.card-sm{background:var(--card);border-radius:var(--radius-sm);padding:12px 14px;margin:8px 16px 0;box-shadow:var(--shadow)}

/* Summary Cards */
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:12px 16px 0}
.sum-card{background:var(--card);border-radius:var(--radius-sm);padding:12px;box-shadow:var(--shadow);text-align:center}
.sum-card .lbl{font-size:10px;color:var(--text2);margin-bottom:4px}
.sum-card .val{font-size:15px;font-weight:700}
.sum-card .unit{font-size:9px;color:var(--text3);margin-top:2px}

/* Month Selector */
.month-scroll{overflow-x:auto;padding:12px 16px 0;scrollbar-width:none}
.month-scroll::-webkit-scrollbar{display:none}
.month-row{display:flex;gap:8px;min-width:max-content}
.month-chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;font-family:'Vazirmatn',sans-serif;white-space:nowrap;transition:all 0.2s}
.month-chip.active{background:var(--primary);border-color:var(--primary);color:#fff}

/* Donut */
.donut-wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.donut-legend{flex:1;min-width:140px}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.legend-bar-bg{height:4px;background:#F0F0F7;border-radius:2px;margin-top:3px}
.legend-bar{height:4px;border-radius:2px;transition:width 0.4s}
.legend-lbl{font-size:11px;color:var(--text)}
.legend-pct{font-size:11px;font-weight:600;margin-right:auto}

/* Transactions */
.tx-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.tx-item:last-child{border-bottom:none}
.tx-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-date{font-size:11px;color:var(--text3);margin-top:2px}
.tx-amount{font-size:14px;font-weight:700;white-space:nowrap}
.tx-actions{display:flex;gap:4px}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;font-size:14px;color:var(--text3)}

/* FAB */
.fab{position:fixed;bottom:calc(80px + var(--safe-bottom) + 12px);left:50%;transform:translateX(-50%);width:56px;height:56px;border-radius:28px;background:var(--primary);color:#fff;border:none;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(108,99,255,0.4);z-index:150;transition:transform 0.2s}
.fab:active{transform:translateX(-50%) scale(0.94)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:430px;padding:20px 20px calc(20px + var(--safe-bottom));max-height:90vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal h2{font-size:16px;font-weight:600;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Vazirmatn',sans-serif;font-size:14px;color:var(--text);background:#fff;outline:none;transition:border 0.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary)}
.form-group textarea{resize:vertical;min-height:70px}
.type-toggle{display:flex;gap:8px;margin-bottom:14px}
.type-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:#fff;font-family:'Vazirmatn',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;color:var(--text2)}
.type-btn.active-inc{background:var(--green-light);border-color:var(--green);color:var(--green)}
.type-btn.active-exp{background:var(--red-light);border-color:var(--red);color:var(--red)}
.btn{width:100%;padding:13px;border-radius:var(--radius-sm);border:none;font-family:'Vazirmatn',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:active{background:var(--primary-dark)}
.btn-secondary{background:var(--primary-light);color:var(--primary);margin-top:8px}
.btn-danger{background:var(--red-light);color:var(--red);margin-top:8px}
.section-title{font-size:13px;font-weight:600;color:var(--text2);padding:12px 16px 4px;text-transform:uppercase;letter-spacing:0.5px}

/* Tags */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-amber{background:var(--amber-light);color:var(--amber)}

/* Tenants */
.tenant-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin:10px 16px 0;overflow:hidden}
.tenant-header{padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer}
.tenant-avatar{width:44px;height:44px;border-radius:14px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tenant-info{flex:1}
.tenant-name{font-size:14px;font-weight:600}
.tenant-unit{font-size:11px;color:var(--text2);margin-top:2px}
.tenant-body{border-top:1px solid var(--border);padding:14px;display:none}
.tenant-body.open{display:block}
.payment-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F7F8FC}
.payment-row:last-child{border-bottom:none}
.pay-month{font-size:12px;font-weight:500}
.pay-status{display:flex;align-items:center;gap:6px}
.status-dot{width:8px;height:8px;border-radius:50%}

/* Notification */
.notif{position:fixed;top:calc(var(--safe-top) + 12px);left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:500;z-index:500;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.notif.show{opacity:1}

/* Chart placeholder */
.chart-wrap{padding:8px 0;overflow-x:auto}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:120px;min-width:max-content;padding:0 4px}
.bar-group{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:36px}
.bar-container{display:flex;gap:3px;align-items:flex-end;height:100px}
.bar{width:14px;border-radius:4px 4px 0 0;transition:height 0.4s;min-height:2px}
.bar-lbl{font-size:9px;color:var(--text3)}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:13px;line-height:1.6}

/* SMS detect */
.sms-result{background:var(--primary-light);border-radius:var(--radius-sm);padding:12px;margin-bottom:12px;font-size:13px;line-height:1.6}
.sms-detected{color:var(--primary);font-weight:600}

/* Scrollbar */
.screen::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div class="app">

<!-- Dashboard Screen -->
<div class="screen active" id="screen-dashboard">
  <div class="header">
    <div class="header-row">
      <div><h1>مالی‌یار</h1><p id="today-date"></p></div>
      <div style="font-size:24px">💼</div>
    </div>
  </div>
  <div class="month-scroll"><div class="month-row" id="month-row"></div></div>
  <div class="summary-grid">
    <div class="sum-card"><div class="lbl">درآمد</div><div class="val" id="d-inc" style="color:var(--green)">۰</div><div class="unit">تومان</div></div>
    <div class="sum-card"><div class="lbl">هزینه</div><div class="val" id="d-exp" style="color:var(--red)">۰</div><div class="unit">تومان</div></div>
    <div class="sum-card"><div class="lbl">مانده</div><div class="val" id="d-bal">۰</div><div class="unit">تومان</div></div>
  </div>
  <div class="card" style="margin-top:12px">
    <div style="font-size:13px;font-weight:600;margin-bottom:12px">توزیع هزینه‌ها</div>
    <div class="donut-wrap">
      <svg id="donut-svg" width="120" height="120" viewBox="0 0 120 120"></svg>
      <div class="donut-legend" id="donut-legend"></div>
    </div>
  </div>
  <div class="section-title">آخرین تراکنش‌ها</div>
  <div class="card-sm"><div id="recent-txs"></div></div>
</div>

<!-- Transactions Screen -->
<div class="screen" id="screen-tx">
  <div class="header">
    <div class="header-row"><div><h1>تراکنش‌ها</h1></div>
    <button onclick="openSmsModal()" style="background:rgba(255,255,255,0.2);border:none;color:#fff;padding:6px 12px;border-radius:20px;font-family:'Vazirmatn',sans-serif;font-size:12px;cursor:pointer">📩 پیامک بانکی</button>
    </div>
  </div>
  <div class="month-scroll"><div class="month-row" id="month-row-tx"></div></div>
  <div class="card-sm" style="margin-top:12px"><div id="tx-list"></div></div>
</div>

<!-- Tenants Screen -->
<div class="screen" id="screen-rent">
  <div class="header"><div class="header-row"><div><h1>اجاره‌داران</h1></div>
  <button onclick="openTenantModal()" style="background:rgba(255,255,255,0.2);border:none;color:#fff;padding:6px 12px;border-radius:20px;font-family:'Vazirmatn',sans-serif;font-size:12px;cursor:pointer">+ واحد جدید</button>
  </div></div>
  <div id="alert-unpaid" style="display:none;background:var(--red-light);border-right:4px solid var(--red);padding:10px 14px;margin:12px 16px 0;border-radius:var(--radius-sm);font-size:12px;color:var(--red);font-weight:500"></div>
  <div id="tenant-list" style="padding-bottom:8px"></div>
</div>

<!-- Reports Screen -->
<div class="screen" id="screen-report">
  <div class="header"><div class="header-row"><div><h1>گزارش‌ها</h1></div></div></div>
  <div class="card" style="margin-top:12px">
    <div style="font-size:13px;font-weight:600;margin-bottom:12px">مقایسه ۱۲ ماه</div>
    <div class="chart-wrap"><div class="bar-chart" id="bar-chart"></div></div>
    <div style="display:flex;gap:16px;margin-top:8px">
      <span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)"><span style="width:10px;height:10px;border-radius:2px;background:var(--green);display:inline-block"></span>درآمد</span>
      <span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)"><span style="width:10px;height:10px;border-radius:2px;background:var(--red);display:inline-block"></span>هزینه</span>
    </div>
  </div>
  <div class="card" style="margin-top:12px">
    <div style="font-size:13px;font-weight:600;margin-bottom:12px">خلاصه سالانه</div>
    <div id="yearly-summary"></div>
  </div>
  <div style="padding:16px;display:flex;gap:10px">
    <button class="btn btn-primary" onclick="exportExcel()" style="flex:1">📥 خروجی اکسل</button>
    <button class="btn btn-secondary" onclick="backupData()" style="flex:1;margin-top:0">💾 پشتیبان‌گیری</button>
  </div>
  <div style="padding:0 16px 8px">
    <button class="btn" onclick="document.getElementById('import-file').click()" style="background:#F7F8FC;color:var(--text2);border:1.5px dashed var(--border)">📂 بازیابی پشتیبان</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="restoreData(this)">
  </div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="goTo('dashboard',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    <span>داشبورد</span>
  </button>
  <button class="nav-btn" onclick="goTo('tx',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    <span>تراکنش‌ها</span>
  </button>
  <button class="nav-btn" onclick="goTo('rent',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>اجاره</span>
  </button>
  <button class="nav-btn" onclick="goTo('report',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span>گزارش</span>
  </button>
</nav>

<button class="fab" id="fab" onclick="openTxModal()">＋</button>

</div>

<!-- Transaction Modal -->
<div class="modal-overlay" id="tx-modal">
<div class="modal">
  <div class="modal-handle"></div>
  <h2 id="tx-modal-title">تراکنش جدید</h2>
  <div class="type-toggle">
    <button class="type-btn active-inc" id="btn-inc" onclick="setType('income')">💚 درآمد</button>
    <button class="type-btn" id="btn-exp" onclick="setType('expense')">🔴 هزینه</button>
  </div>
  <div class="form-group"><label>دسته‌بندی</label>
    <select id="tx-cat"><option value="">انتخاب کنید...</option></select>
  </div>
  <div class="form-group"><label>مبلغ (تومان)</label><input type="number" id="tx-amount" placeholder="مثال: 5000000"></div>
  <div class="form-group"><label>توضیحات</label><input type="text" id="tx-desc" placeholder="اختیاری"></div>
  <div style="display:flex;gap:10px">
    <div class="form-group" style="flex:1"><label>روز</label><input type="number" id="tx-day" min="1" max="31" placeholder="روز"></div>
    <div class="form-group" style="flex:1"><label>ماه</label><select id="tx-month"></select></div>
    <div class="form-group" style="flex:1"><label>سال</label><input type="number" id="tx-year" placeholder="مثال: 1403"></div>
  </div>
  <button class="btn btn-primary" onclick="saveTx()">ذخیره</button>
  <button class="btn btn-secondary" onclick="closeModal('tx-modal')">انصراف</button>
  <button class="btn btn-danger" id="delete-tx-btn" style="display:none" onclick="deleteTx()">🗑️ حذف</button>
</div>
</div>

<!-- SMS Modal -->
<div class="modal-overlay" id="sms-modal">
<div class="modal">
  <div class="modal-handle"></div>
  <h2>پیامک بانکی</h2>
  <div class="form-group"><label>متن پیامک را اینجا paste کنید</label>
    <textarea id="sms-text" placeholder="مثال: مبلغ ۵٬۰۰۰٬۰۰۰ ریال بابت واریز به حساب شما..." rows="4"></textarea>
  </div>
  <button class="btn btn-primary" onclick="parseSms()">🔍 تشخیص خودکار</button>
  <div id="sms-result" style="display:none;margin-top:12px"></div>
  <div id="sms-form" style="display:none;margin-top:8px">
    <div class="type-toggle">
      <button class="type-btn" id="sms-btn-inc" onclick="setSmsType('income')">💚 درآمد</button>
      <button class="type-btn" id="sms-btn-exp" onclick="setSmsType('expense')">🔴 هزینه</button>
    </div>
    <div class="form-group"><label>دسته‌بندی</label><select id="sms-cat"></select></div>
    <div class="form-group"><label>مبلغ (تومان)</label><input type="number" id="sms-amount"></div>
    <div class="form-group"><label>توضیحات</label><input type="text" id="sms-desc"></div>
    <button class="btn btn-primary" onclick="saveSms()">✅ ثبت تراکنش</button>
  </div>
  <button class="btn btn-secondary" style="margin-top:8px" onclick="closeModal('sms-modal')">انصراف</button>
</div>
</div>

<!-- Tenant Modal -->
<div class="modal-overlay" id="tenant-modal">
<div class="modal">
  <div class="modal-handle"></div>
  <h2 id="tenant-modal-title">واحد جدید</h2>
  <div class="form-group"><label>نام مستاجر</label><input type="text" id="t-name" placeholder="نام و نام خانوادگی"></div>
  <div class="form-group"><label>نام/شماره واحد</label><input type="text" id="t-unit" placeholder="مثال: واحد ۳ - طبقه دوم"></div>
  <div class="form-group"><label>نوع ملک</label>
    <select id="t-type"><option value="مسکونی">🏠 مسکونی</option><option value="تجاری">🏢 تجاری</option></select>
  </div>
  <div class="form-group"><label>مبلغ اجاره ماهانه (تومان)</label><input type="number" id="t-rent" placeholder="مثال: 8000000"></div>
  <div class="form-group"><label>ودیعه (تومان)</label><input type="number" id="t-deposit" placeholder="مثال: 200000000"></div>
  <div class="form-group"><label>سررسید پرداخت (روز ماه)</label><input type="number" id="t-due" min="1" max="31" placeholder="مثال: 5"></div>
  <div class="form-group"><label>یادداشت</label><textarea id="t-note" placeholder="اطلاعات تکمیلی..." rows="2"></textarea></div>
  <button class="btn btn-primary" onclick="saveTenant()">ذخیره</button>
  <button class="btn btn-secondary" onclick="closeModal('tenant-modal')">انصراف</button>
  <button class="btn btn-danger" id="delete-tenant-btn" style="display:none" onclick="deleteTenant()">🗑️ حذف واحد</button>
</div>
</div>

<!-- Payment Modal -->
<div class="modal-overlay" id="payment-modal">
<div class="modal">
  <div class="modal-handle"></div>
  <h2 id="payment-modal-title">ثبت پرداخت</h2>
  <div id="payment-months"></div>

<div class="notif" id="notif"></div>

<script>
const MONTHS_FA = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
const COLORS = ['#6C63FF','#1D9E75','#D85A30','#185FA5','#BA7517','#E24B4A','#9333EA','#0891B2'];

let state = loadState();
let selMonth = state.selMonth || 0;
let editTxId = null;
let editTenantId = null;
let smsParsed = {};
let smsType = 'income';
let txType = 'income';

function loadState() {
  try {
    const s = localStorage.getItem('maliyar_v2');
    return s ? JSON.parse(s) : defaultState();
  } catch(e) { return defaultState(); }
}

function defaultState() {
  return {
    selMonth: 0,
    transactions: [],
    tenants: [],
    payments: {},
    categories: {
      income: [
        {id:'sal',name:'حقوق و دستمزد',icon:'💼'},
        {id:'rent_a',name:'اجاره آپارتمان',icon:'🏠'},
        {id:'rent_c',name:'اجاره تجاری',icon:'🏢'},
        {id:'inv',name:'سود سرمایه‌گذاری',icon:'📈'},
        {id:'other_i',name:'سایر درآمدها',icon:'💰'},
      ],
      expense: [
        {id:'hous',name:'مسکن و آب‌وبرق',icon:'🏡'},
        {id:'food',name:'خوراک و خرید',icon:'🛒'},
        {id:'health',name:'سلامت و ورزش',icon:'❤️'},
        {id:'save',name:'پس‌انداز',icon:'🏦'},
      ]
    }
  };
}

function save() {
  state.selMonth = selMonth;
  localStorage.setItem('maliyar_v2', JSON.stringify(state));
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function numFa(n) {
  if(n===undefined||n===null) return '۰';
  return Math.round(n).toLocaleString('fa-IR');
}

function toLatinNum(s) {
  if(!s) return 0;
  const map = {'۰':'0','۱':'1','۲':'2','۳':'3','۴':'4','۵':'5','۶':'6','۷':'7','۸':'8','۹':'9'};
  return parseFloat(String(s).replace(/[۰-۹]/g, d => map[d]).replace(/,/g,'')) || 0;
}

function todayJalali() {
  const now = new Date();
  return gregorianToJalali(now.getFullYear(), now.getMonth()+1, now.getDate());
}

function gregorianToJalali(gy, gm, gd) {
  const g_d_m = [0,31,59,90,120,151,181,212,243,273,304,334];
  let jy = gy <= 1600 ? 0 : 979;
  gy -= gy <= 1600 ? 621 : 1600;
  const gy2 = gm > 2 ? gy+1 : gy;
  let days = (365*gy) + Math.floor((gy2+3)/4) - Math.floor((gy2+99)/100) + Math.floor((gy2+399)/400) - 80 + gd + g_d_m[gm-1];
  jy += 33 * Math.floor(days/12053); days %= 12053;
  jy += 4 * Math.floor(days/1461); days %= 1461;
  if(days > 365) { jy += Math.floor((days-1)/365); days = (days-1)%365; }
  const jm = days < 186 ? 1+Math.floor(days/31) : 7+Math.floor((days-186)/30);
  const jd = 1 + (days < 186 ? days%31 : (days-186)%30);
  return {y:jy, m:jm, d:jd};
}

function goTo(screen, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-'+screen).classList.add('active');
  btn.classList.add('active');
  document.getElementById('fab').style.display = screen === 'tx' || screen === 'dashboard' ? 'flex' : 'none';
  if(screen==='dashboard') renderDashboard();
  if(screen==='tx') renderTxScreen();
  if(screen==='rent') renderTenants();
  if(screen==='report') renderReport();
}

function renderMonthRow(containerId, callback) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  MONTHS_FA.forEach((m,i) => {
    const chip = document.createElement('button');
    chip.className = 'month-chip' + (i===selMonth?' active':'');
    chip.textContent = m;
    chip.onclick = () => { selMonth = i; save(); callback(); };
    c.appendChild(chip);
  });
  setTimeout(() => { c.children[selMonth]?.scrollIntoView({inline:'center',behavior:'smooth'}); }, 100);
}

function getTxForMonth(m) {
  return state.transactions.filter(t => t.month === m);
}

function calcTotals(txs) {
  let inc = 0, exp = 0;
  txs.forEach(t => { if(t.type==='income') inc += t.amount; else exp += t.amount; });
  return {inc, exp, bal: inc-exp};
}

function getCatById(type, id) {
  return state.categories[type]?.find(c=>c.id===id) || {name:'سایر',icon:'📌'};
}

function renderDashboard() {
  const today = todayJalali();
  document.getElementById('today-date').textContent = `${today.d} ${MONTHS_FA[today.m-1]} ${today.y}`;
  renderMonthRow('month-row', renderDashboard);
  const txs = getTxForMonth(selMonth);
  const {inc, exp, bal} = calcTotals(txs);
  document.getElementById('d-inc').textContent = numFa(inc);
  document.getElementById('d-exp').textContent = numFa(exp);
  const balEl = document.getElementById('d-bal');
  balEl.textContent = (bal<0?'-':'')+numFa(Math.abs(bal));
  balEl.style.color = bal>=0 ? 'var(--green)' : 'var(--red)';
  renderDonut(txs, exp);
  renderRecentTxs(txs.slice(-5).reverse());
}

function renderDonut(txs, total) {
  const cats = {};
  txs.filter(t=>t.type==='expense').forEach(t => { cats[t.cat] = (cats[t.cat]||0) + t.amount; });
  const entries = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const svg = document.getElementById('donut-svg');
  const leg = document.getElementById('donut-legend');
  svg.innerHTML = ''; leg.innerHTML = '';
  if(total===0||entries.length===0) {
    svg.innerHTML = `<circle cx="60" cy="60" r="45" fill="none" stroke="#E8E9F0" stroke-width="22"/><text x="60" y="64" text-anchor="middle" font-size="10" fill="#9CA3AF" font-family="Vazirmatn">بدون داده</text>`;
    return;
  }
  let startAngle = -Math.PI/2;
  entries.forEach(([catId, val], i) => {
    const pct = val/total;
    const angle = pct*2*Math.PI;
    const r=45,ir=23,cx=60,cy=60;
    const x1=cx+r*Math.cos(startAngle),y1=cy+r*Math.sin(startAngle);
    const x2=cx+r*Math.cos(startAngle+angle),y2=cy+r*Math.sin(startAngle+angle);
    const xi1=cx+ir*Math.cos(startAngle),yi1=cy+ir*Math.sin(startAngle);
    const xi2=cx+ir*Math.cos(startAngle+angle),yi2=cy+ir*Math.sin(startAngle+angle);
    const large=angle>Math.PI?1:0;
    const path=`M ${xi1} ${yi1} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${ir} ${ir} 0 ${large} 0 ${xi1} ${yi1} Z`;
    const color = COLORS[i%COLORS.length];
    const el = document.createElementNS('http://www.w3.org/2000/svg','path');
    el.setAttribute('d',path); el.setAttribute('fill',color);
    el.setAttribute('stroke','white'); el.setAttribute('stroke-width','2');
    svg.appendChild(el);
    startAngle += angle;
    const cat = getCatById('expense', catId);
    const p = (pct*100).toFixed(1);
    leg.innerHTML += `<div class="legend-item">
      <span class="legend-dot" style="background:${color}"></span>
      <div style="flex:1"><div style="display:flex;justify-content:space-between"><span class="legend-lbl">${cat.icon} ${cat.name}</span><span class="legend-pct">${p}٪</span></div>
      <div class="legend-bar-bg"><div class="legend-bar" style="width:${p}%;background:${color}"></div></div>
      <div style="font-size:10px;color:var(--text3);margin-top:2px">${numFa(val)} ت</div></div></div>`;
  });
}

function renderRecentTxs(txs) {
  const c = document.getElementById('recent-txs');
  if(!txs.length){c.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>تراکنشی ثبت نشده</p></div>';return;}
  c.innerHTML = txs.map(t => txItem(t)).join('');
}

function txItem(t) {
  const isInc = t.type==='income';
  const cat = getCatById(t.type, t.cat);
  const color = isInc ? 'var(--green-light)' : 'var(--red-light)';
  const sign = isInc ? '+' : '-';
  const vc = isInc ? 'var(--green)' : 'var(--red)';
  return `<div class="tx-item" onclick="editTx('${t.id}')">
    <div class="tx-icon" style="background:${color}">${cat.icon}</div>
    <div class="tx-info"><div class="tx-title">${cat.name}${t.desc?' — '+t.desc:''}</div>
    <div class="tx-date">${t.day} ${MONTHS_FA[t.month]} ${t.year||1403}</div></div>
    <div class="tx-amount" style="color:${vc}">${sign}${numFa(t.amount)}</div>
  </div>`;
}

function renderTxScreen() {
  renderMonthRow('month-row-tx', renderTxScreen);
  const txs = getTxForMonth(selMonth).reverse();
  const c = document.getElementById('tx-list');
  if(!txs.length){c.innerHTML='<div class="empty"><div class="empty-icon">💳</div><p>تراکنشی در این ماه ندارید<br>دکمه + را بزنید</p></div>';return;}
  c.innerHTML = txs.map(t => txItem(t)).join('');
}

function openTxModal(type='income') {
  editTxId = null;
  txType = type;
  document.getElementById('tx-modal-title').textContent = 'تراکنش جدید';
  document.getElementById('tx-amount').value='';
  document.getElementById('tx-desc').value='';
  document.getElementById('delete-tx-btn').style.display='none';
  const today = todayJalali();
  document.getElementById('tx-day').value = today.d;
  document.getElementById('tx-year').value = today.y;
  fillMonthSelect('tx-month', today.m-1);
  setType(type);
  document.getElementById('tx-modal').classList.add('open');
}

function editTx(id) {
  const t = state.transactions.find(x=>x.id===id);
  if(!t) return;
  editTxId = id;
  txType = t.type;
  document.getElementById('tx-modal-title').textContent = 'ویرایش تراکنش';
  document.getElementById('tx-amount').value = t.amount;
  document.getElementById('tx-desc').value = t.desc||'';
  document.getElementById('tx-day').value = t.day;
  document.getElementById('tx-year').value = t.year||1403;
  fillMonthSelect('tx-month', t.month);
  setType(t.type);
  setTimeout(()=>{ document.getElementById('tx-cat').value = t.cat; },50);
  document.getElementById('delete-tx-btn').style.display='block';
  document.getElementById('tx-modal').classList.add('open');
}

function setType(type) {
  txType = type;
  const bi = document.getElementById('btn-inc');
  const be = document.getElementById('btn-exp');
  bi.className = 'type-btn' + (type==='income'?' active-inc':'');
  be.className = 'type-btn' + (type==='expense'?' active-exp':'');
  fillCatSelect('tx-cat', type);
}

function fillCatSelect(id, type) {
  const sel = document.getElementById(id);
  sel.innerHTML = '<option value="">انتخاب کنید...</option>' +
    state.categories[type].map(c=>`<option value="${c.id}">${c.icon} ${c.name}</option>`).join('') +
    `<option value="__new__">➕ دسته‌بندی جدید</option>`;
  sel.onchange = function(){ if(this.value==='__new__'){ openCatModal(type); this.value=''; }};
}

function fillMonthSelect(id, selectedIdx) {
  const sel = document.getElementById(id);
  sel.innerHTML = MONTHS_FA.map((m,i)=>`<option value="${i}" ${i===selectedIdx?'selected':''}>${m}</option>`).join('');
}

function saveTx() {
  const amount = toLatinNum(document.getElementById('tx-amount').value);
  const cat = document.getElementById('tx-cat').value;
  const desc = document.getElementById('tx-desc').value.trim();
  const day = parseInt(document.getElementById('tx-day').value)||1;
  const month = parseInt(document.getElementById('tx-month').value);
  const year = parseInt(document.getElementById('tx-year').value)||1403;
  if(!amount||!cat){ showNotif('⚠️ مبلغ و دسته‌بندی را وارد کنید'); return; }
  if(editTxId) {
    const idx = state.transactions.findIndex(t=>t.id===editTxId);
    state.transactions[idx] = {...state.transactions[idx], type:txType, cat, amount, desc, day, month, year};
  } else {
    state.transactions.push({id:uid(), type:txType, cat, amount, desc, day, month, year});
  }
  save(); closeModal('tx-modal'); showNotif('✅ ذخیره شد');
  renderDashboard(); renderTxScreen();
}

function deleteTx() {
  if(!editTxId) return;
  state.transactions = state.transactions.filter(t=>t.id!==editTxId);
  save(); closeModal('tx-modal'); showNotif('🗑️ حذف شد');
  renderDashboard(); renderTxScreen();
}

function parseSms() {
  const text = document.getElementById('sms-text').value;
  if(!text){ showNotif('⚠️ متن پیامک را وارد کنید'); return; }
  const toLatin = s => s.replace(/[۰-۹]/g, d => '۰۱۲۳۴۵۶۷۸۹'.indexOf(d));
  const latinText = toLatin(text);
  const amountMatch = latinText.match(/(\d[\d,،.]*)\s*(ریال|تومان|T|R)/i) ||
                      latinText.match(/مبلغ\s*:?\s*([\d,،.]+)/i) ||
                      latinText.match(/([\d,،.]+)\s*ر\.?ی/i);
  let amount = 0;
  if(amountMatch) {
    amount = parseFloat(amountMatch[1].replace(/[,،]/g,''));
    if(text.includes('ریال')) amount = Math.round(amount/10);
  }
  const isDeposit = /واریز|دریافت|credit|deposit|افزایش/i.test(text);
  const isWithdraw = /برداشت|پرداخت|debit|خرید|کسر/i.test(text);
  const detectedType = isDeposit ? 'income' : (isWithdraw ? 'expense' : '');
  const res = document.getElementById('sms-result');
  const form = document.getElementById('sms-form');
  if(amount > 0) {
    smsParsed = {amount, type: detectedType||'income'};
    res.style.display='block';
    res.innerHTML = `<div class="sms-result">
      <div class="sms-detected">✅ تشخیص داده شد</div>
      <div>مبلغ: <strong>${numFa(amount)} تومان</strong></div>
      <div>نوع: <strong>${detectedType==='income'?'واریز (درآمد)':detectedType==='expense'?'برداشت (هزینه)':'نامشخص'}</strong></div>
    </div>`;
    form.style.display='block';
    setSmsType(detectedType||'income');
    document.getElementById('sms-amount').value = amount;
  } else {
    res.style.display='block';
    res.innerHTML = '<div class="sms-result" style="background:var(--red-light)">⚠️ مبلغی تشخیص داده نشد. لطفاً دستی وارد کنید.</div>';
    form.style.display='block';
    setSmsType('income');
  }
}

function setSmsType(type) {
  smsType = type;
  document.getElementById('sms-btn-inc').className = 'type-btn' + (type==='income'?' active-inc':'');
  document.getElementById('sms-btn-exp').className = 'type-btn' + (type==='expense'?' active-exp':'');
  fillCatSelect('sms-cat', type);
}

function openSmsModal() {
  document.getElementById('sms-text').value='';
  document.getElementById('sms-result').style.display='none';
  document.getElementById('sms-form').style.display='none';
  document.getElementById('sms-modal').classList.add('open');
}

function saveSms() {
  const amount = toLatinNum(document.getElementById('sms-amount').value);
  const cat = document.getElementById('sms-cat').value;
  const desc = document.getElementById('sms-desc').value.trim();
  if(!amount||!cat){ showNotif('⚠️ مبلغ و دسته‌بندی را وارد کنید'); return; }
  const today = todayJalali();
  state.transactions.push({id:uid(), type:smsType, cat, amount, desc: desc||'پیامک بانکی', day:today.d, month:today.m-1, year:today.y});
  save(); closeModal('sms-modal'); showNotif('✅ تراکنش ثبت شد');
  renderDashboard(); renderTxScreen();
}

function openCatModal(type) {
  document.getElementById('cat-name').value='';
  document.getElementById('cat-icon').value='';
  document.getElementById('cat-type').value=type;
  document.getElementById('cat-modal').classList.add('open');
}

function saveCat() {
  const name = document.getElementById('cat-name').value.trim();
  const icon = document.getElementById('cat-icon').value.trim()||'📌';
  const type = document.getElementById('cat-type').value;
  if(!name){ showNotif('⚠️ نام را وارد کنید'); return; }
  const id = 'c_'+uid();
  state.categories[type].push({id, name, icon});
  save(); closeModal('cat-modal'); showNotif('✅ دسته‌بندی اضافه شد');
  fillCatSelect('tx-cat', txType);
}

function renderTenants() {
  const list = document.getElementById('tenant-list');
  const today = todayJalali();
  let unpaid = [];
  if(!state.tenants.length){
    list.innerHTML='<div class="empty"><div class="empty-icon">🏠</div><p>هنوز واحدی ثبت نشده<br>دکمه «واحد جدید» را بزنید</p></div>';
    document.getElementById('alert-unpaid').style.display='none'; return;
  }
  list.innerHTML = state.tenants.map(t => {
    const payKey = `${t.id}_${today.y}_${today.m}`;
    const paid = state.payments[payKey];
    if(!paid) unpaid.push(t.name);
    const statusBadge = paid
      ? `<span class="badge badge-green">✅ پرداخت شده</span>`
      : `<span class="badge badge-red">⏳ در انتظار</span>`;
    return `<div class="tenant-card">
      <div class="tenant-header" onclick="toggleTenant('tb_${t.id}')">
        <div class="tenant-avatar">${t.type==='تجاری'?'🏢':'🏠'}</div>
        <div class="tenant-info"><div class="tenant-name">${t.name}</div>
          <div class="tenant-unit">${t.unit} · ${t.type} · سررسید: ${t.due}ام</div></div>
        <div style="text-align:left">${statusBadge}</div>
      </div>
      <div class="tenant-body" id="tb_${t.id}">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
          <div style="background:var(--bg);border-radius:8px;padding:8px;font-size:11px"><div style="color:var(--text2)">اجاره ماهانه</div><div style="font-weight:700;color:var(--primary)">${numFa(t.rent)} ت</div></div>
          <div style="background:var(--bg);border-radius:8px;padding:8px;font-size:11px"><div style="color:var(--text2)">ودیعه</div><div style="font-weight:700">${numFa(t.deposit)} ت</div></div>
        </div>
        ${t.note?`<div style="font-size:11px;color:var(--text2);margin-bottom:10px">📝 ${t.note}</div>`:''}
        <div style="display:flex;gap:8px">
          <button onclick="openPaymentModal('${t.id}')" style="flex:1;padding:8px;border-radius:8px;border:none;background:var(--primary-light);color:var(--primary);font-family:'Vazirmatn',sans-serif;font-size:12px;font-weight:500;cursor:pointer">📋 سابقه پرداخت</button>
          <button onclick="openTenantModal('${t.id}')" style="padding:8px 12px;border-radius:8px;border:none;background:var(--bg);color:var(--text2);font-family:'Vazirmatn',sans-serif;font-size:12px;cursor:pointer">✏️ ویرایش</button>
        </div>
      </div>
    </div>`;
  }).join('');
  if(unpaid.length) {
    const al = document.getElementById('alert-unpaid');
    al.style.display='block';
    al.textContent = `⚠️ پرداخت نشده این ماه: ${unpaid.join('، ')}`;
  } else {
    document.getElementById('alert-unpaid').style.display='none';
  }
}

function toggleTenant(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

function openTenantModal(id) {
  editTenantId = id||null;
  const del = document.getElementById('delete-tenant-btn');
  if(id) {
    const t = state.tenants.find(x=>x.id===id);
    if(!t) return;
    document.getElementById('tenant-modal-title').textContent='ویرایش واحد';
    document.getElementById('t-name').value=t.name;
    document.getElementById('t-unit').value=t.unit;
    document.getElementById('t-type').value=t.type;
    document.getElementById('t-rent').value=t.rent;
    document.getElementById('t-deposit').value=t.deposit||'';
    document.getElementById('t-due').value=t.due||'';
    document.getElementById('t-note').value=t.note||'';
    del.style.display='block';
  } else {
    document.getElementById('tenant-modal-title').textContent='واحد جدید';
    ['t-name','t-unit','t-rent','t-deposit','t-due','t-note'].forEach(id=>document.getElementById(id).value='');
    del.style.display='none';
  }
  document.getElementById('tenant-modal').classList.add('open');
}

function saveTenant() {
  const name=document.getElementById('t-name').value.trim();
  const unit=document.getElementById('t-unit').value.trim();
  const type=document.getElementById('t-type').value;
  const rent=toLatinNum(document.getElementById('t-rent').value);
  const deposit=toLatinNum(document.getElementById('t-deposit').value);
  const due=parseInt(document.getElementById('t-due').value)||1;
  const note=document.getElementById('t-note').value.trim();
  if(!name||!unit||!rent){ showNotif('⚠️ اطلاعات ضروری را وارد کنید'); return; }
  if(editTenantId) {
    const idx=state.tenants.findIndex(t=>t.id===editTenantId);
    state.tenants[idx]={...state.tenants[idx],name,unit,type,rent,deposit,due,note};
  } else {
    state.tenants.push({id:uid(),name,unit,type,rent,deposit,due,note});
  }
  save(); closeModal('tenant-modal'); showNotif('✅ ذخیره شد'); renderTenants();
}

function deleteTenant() {
  if(!editTenantId) return;
  state.tenants=state.tenants.filter(t=>t.id!==editTenantId);
  Object.keys(state.payments).filter(k=>k.startsWith(editTenantId)).forEach(k=>delete state.payments[k]);
  save(); closeModal('tenant-modal'); showNotif('🗑️ واحد حذف شد'); renderTenants();
}

function openPaymentModal(tenantId) {
  const t = state.tenants.find(x=>x.id===tenantId);
  if(!t) return;
  document.getElementById('payment-modal-title').textContent = `پرداخت‌های ${t.name}`;
  const today = todayJalali();
  let html='';
  for(let m=0;m<12;m++) {
    const key=`${tenantId}_${today.y}_${m+1}`;
    const paid=state.payments[key];
    html+=`<div class="payment-row">
      <div><div class="pay-month">${MONTHS_FA[m]} ${today.y}</div>
      <div style="font-size:10px;color:var(--text3)">${numFa(t.rent)} تومان</div></div>
      <div class="pay-status">
        ${paid
          ?`<span class="badge badge-green">✅ پرداخت شده</span><button onclick="togglePay('${key}',false,'${tenantId}')" style="background:none;border:none;font-size:13px;cursor:pointer;color:var(--text3)">↩</button>`
          :`<button onclick="togglePay('${key}',true,'${tenantId}')" style="padding:5px 10px;border-radius:6px;border:1.5px solid var(--green);background:var(--green-light);color:var(--green);font-family:'Vazirmatn',sans-serif;font-size:11px;cursor:pointer">ثبت پرداخت</button>`}
      </div>
    </div>`;
  }
  document.getElementById('payment-months').innerHTML=html;
  document.getElementById('payment-modal').classList.add('open');
}

function togglePay(key, paid, tenantId) {
  if(paid) state.payments[key]=true;
  else delete state.payments[key];
  save(); openPaymentModal(tenantId); renderTenants();
}

function renderReport() {
  const chart = document.getElementById('bar-chart');
  let allInc=0, allExp=0;
  const maxVal = Math.max(...MONTHS_FA.map((_,i)=>{
    const {inc,exp}=calcTotals(getTxForMonth(i));
    return Math.max(inc,exp,1);
  }));
  chart.innerHTML = MONTHS_FA.map((_,i)=>{
    const {inc,exp}=calcTotals(getTxForMonth(i));
    allInc+=inc; allExp+=exp;
    const hi=Math.round((inc/maxVal)*100), he=Math.round((exp/maxVal)*100);
    return `<div class="bar-group">
      <div class="bar-container">
        <div class="bar" style="height:${hi}px;background:var(--green);min-height:2px"></div>
        <div class="bar" style="height:${he}px;background:var(--red);min-height:2px"></div>
      </div>
      <div class="bar-lbl">${MONTHS_FA[i].slice(0,3)}</div>
    </div>`;
  }).join('');
  const ys = document.getElementById('yearly-summary');
  const bal=allInc-allExp;
  ys.innerHTML=`
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:13px;color:var(--text2)">جمع درآمد سالانه</span>
      <span style="font-size:14px;font-weight:600;color:var(--green)">${numFa(allInc)} ت</span>
    </div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:13px;color:var(--text2)">جمع هزینه سالانه</span>
      <span style="font-size:14px;font-weight:600;color:var(--red)">${numFa(allExp)} ت</span>
    </div>
    <div style="display:flex;justify-content:space-between;padding:8px 0">
      <span style="font-size:13px;color:var(--text2)">مانده کل</span>
      <span style="font-size:14px;font-weight:700;color:${bal>=0?'var(--green)':'var(--red)'}">${bal>=0?'+':''}${numFa(bal)} ت</span>
    </div>`;
}

function exportExcel() {
  const wb = XLSX.utils.book_new();
  // Transactions sheet
  const txRows = [['نوع','دسته‌بندی','مبلغ (تومان)','توضیحات','روز','ماه','سال']];
  state.transactions.forEach(t => {
    const cat=getCatById(t.type,t.cat);
    txRows.push([t.type==='income'?'درآمد':'هزینه',cat.name,t.amount,t.desc||'',t.day,MONTHS_FA[t.month],t.year||1403]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(txRows), 'تراکنش‌ها');
  // Monthly summary
  const sumRows=[['ماه','درآمد','هزینه','مانده']];
  MONTHS_FA.forEach((m,i)=>{
    const {inc,exp,bal}=calcTotals(getTxForMonth(i));
    sumRows.push([m,inc,exp,bal]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sumRows), 'خلاصه ماهانه');
  // Tenants
  const tRows=[['نام','واحد','نوع','اجاره','ودیعه','سررسید']];
  state.tenants.forEach(t=>tRows.push([t.name,t.unit,t.type,t.rent,t.deposit||0,t.due||'']));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(tRows), 'اجاره‌داران');
  XLSX.writeFile(wb, `maliyar_${new Date().toLocaleDateString('fa-IR').replace(/\//g,'-')}.xlsx`);
  showNotif('📥 فایل اکسل دانلود شد');
}

function backupData() {
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url;
  a.download=`maliyar_backup_${Date.now()}.json`; a.click();
  URL.revokeObjectURL(url);
  showNotif('💾 پشتیبان‌گیری انجام شد');
}

function restoreData(input) {
  const file = input.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if(parsed.transactions && parsed.categories) {
        state = parsed; save(); showNotif('✅ داده‌ها بازیابی شدند');
        renderDashboard();
      } else { showNotif('⚠️ فایل نامعتبر'); }
    } catch { showNotif('⚠️ خطا در خواندن فایل'); }
  };
  r.readAsText(file);
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'), 2500);
}

// Notifications
function requestNotif() {
  if('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function checkDuePayments() {
  const today = todayJalali();
  state.tenants.forEach(t => {
    if(today.d >= t.due) {
      const key=`${t.id}_${today.y}_${today.m}`;
      if(!state.payments[key] && Notification.permission==='granted') {
        new Notification('مالی‌یار', {body:`${t.name} — اجاره ${MONTHS_FA[today.m-1]} پرداخت نشده`, icon:'💰'});
      }
    }
  });
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); });
});

// Init
renderDashboard();
requestNotif();
setTimeout(checkDuePayments, 2000);
</script>
</body>
</html>
